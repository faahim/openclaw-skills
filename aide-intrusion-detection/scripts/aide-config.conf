# AIDE Configuration — aide-intrusion-detection skill
# See: man aide.conf

# Database locations
database_in=file:/var/lib/aide/aide.db
database_out=file:/var/lib/aide/aide.db.new

# Check rules
# p:  permissions
# i:  inode number
# n:  number of links
# u:  user
# g:  group
# s:  size
# b:  block count
# m:  mtime
# c:  ctime
# sha256: SHA-256 hash
# S:  check for growing size

# Rule definitions
NORMAL = p+i+n+u+g+s+m+c+sha256
PERMS = p+i+u+g
LOG = p+u+g+i+n+S
DIR = p+i+n+u+g

# Monitored directories
/etc        NORMAL
/usr/bin    NORMAL
/usr/sbin   NORMAL
/usr/lib    NORMAL
/boot       NORMAL
/root/.ssh  NORMAL

# Web files (if they exist)
=/var/www    DIR
/var/www     NORMAL

# SSH keys
/home        DIR
!/home/*/\.cache
!/home/*/\.local

# Excluded paths (change too often)
!/var/log
!/var/cache
!/var/tmp
!/tmp
!/proc
!/sys
!/run
!/dev
!/var/lib/aide
!/var/lib/dpkg
!/var/lib/apt
!/var/lib/mlocate
!/var/spool
