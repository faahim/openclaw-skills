# File Watcher Configuration
# Each watcher monitors a path and triggers actions on events.

watchers:
  - name: "source-rebuild"
    path: ./src
    recursive: true
    events: [modify, create, delete]
    filter: '\.(ts|tsx|js|jsx|css)$'
    exclude: 'node_modules|\.git|dist'
    debounce: 2
    run: "npm run build"

  - name: "config-restart"
    path: /etc/myapp
    recursive: false
    events: [modify]
    filter: '\.yaml$|\.json$'
    debounce: 1
    run: "systemctl restart myapp"

  - name: "upload-sync"
    path: ./uploads
    recursive: true
    events: [create, moved_to]
    debounce: 5
    run: "rsync -av ./uploads/ backup:/data/uploads/"
